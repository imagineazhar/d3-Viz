name: Bug report
description: Report a bug in a visualization or the gallery
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Affected route
      placeholder: "#/viz/bar-chart-race"